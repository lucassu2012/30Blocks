name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build

      - name: Build Windows EXE
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: 30-Blocks-Windows-x64
          path: |
            release/*.exe
            release/*.zip
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
          body: |
            ## 30-Blocks 时间管理工具

            ### 下载说明
            - **30-Blocks-*-portable.exe** - 便携版，无需安装，双击即可运行
            - **30-Blocks-Setup-*.exe** - 安装版，支持自定义安装路径

            ### 功能特性
            - 每天48个30分钟时间块，日/周/月三种视图
            - 三级活动分类体系（可自定义）
            - 时间总结与分类分布图表
            - Outlook日历集成（ICS导入）
            - 浏览器通知提醒
            - 数据导入/导出（JSON格式）
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
